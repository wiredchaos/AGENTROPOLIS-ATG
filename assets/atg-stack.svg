<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">AGENTROPOLIS ATG stack</title><desc id="desc">Holographic diagram showing ATG, Atranic, and ATRALITH.</desc>
<defs>
  <radialGradient id="bg" cx="50%" cy="45%"><stop offset="0" stop-color="#10232a"/><stop offset=".55" stop-color="#05090d"/><stop offset="1" stop-color="#020406"/></radialGradient>
  <linearGradient id="red" x1="0" x2="1"><stop stop-color="#ff233f"/><stop offset="1" stop-color="#7e071b"/></linearGradient>
  <linearGradient id="cyan" x1="0" x2="1"><stop stop-color="#53f3ff"/><stop offset="1" stop-color="#087f9a"/></linearGradient>
  <linearGradient id="purple" x1="0" x2="1"><stop stop-color="#d45cff"/><stop offset="1" stop-color="#5a147c"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M50 0H0V50" fill="none" stroke="#52eefe" stroke-opacity=".08"/></pattern>
</defs>
<rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/>
<g opacity=".35" stroke="#ff3048"><path d="M0 150H470L540 80H1040L1110 150H1600" fill="none"/><path d="M0 760H420L490 830H1110L1180 760H1600" fill="none"/></g>
<text x="90" y="105" fill="#fff" font-family="Arial" font-weight="800" font-size="52" letter-spacing="10">AGENTROPOLIS-ATG</text>
<text x="90" y="148" fill="#55efff" font-family="monospace" font-size="18" letter-spacing="6">THE OPEN AGENT TRANSACTION GRAMMAR</text>
<g transform="translate(90 235)">
