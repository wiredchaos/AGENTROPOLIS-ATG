<path d="M510 450h80M1010 450h80" stroke="#b8ff5a" stroke-width="4" stroke-dasharray="10 14" filter="url(#glow)"/>
<text x="800" y="760" text-anchor="middle" fill="#fff" font-family="Arial" font-weight="700" font-size="26">ATG DEFINES THE RULES · ATRANIC CARRIES THE MEANING · ATRALITH RUNS THE TOOLS</text>
<text x="800" y="818" text-anchor="middle" fill="#ff3048" font-family="monospace" font-size="20" letter-spacing="4">BUILT IN PUBLIC BY NEURO</text>
</svg>