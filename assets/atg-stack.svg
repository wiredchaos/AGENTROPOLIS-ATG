 <circle cx="210" cy="120" r="82" fill="none" stroke="#ff3048" stroke-width="3" filter="url(#glow)"/><circle cx="210" cy="120" r="58" fill="none" stroke="#ff3048" stroke-opacity=".4"/>
 <path d="M210 55l55 100h-110zM210 80v110M175 145h70" fill="none" stroke="url(#red)" stroke-width="12" stroke-linejoin="round" filter="url(#glow)"/>
 <text x="210" y="250" text-anchor="middle" fill="#ff4058" font-family="Arial" font-weight="800" font-size="36">ATG</text>
 <text x="210" y="286" text-anchor="middle" fill="#fff" font-family="monospace" font-size="16">THE STANDARD</text>
 <text x="50" y="338" fill="#a9bac0" font-family="Arial" font-size="18">Identity · Mandates · Authority</text><text x="50" y="372" fill="#a9bac0" font-family="Arial" font-size="18">Evidence · Receipts · Reputation</text>
</g>
<g transform="translate(590 235)">
 <rect width="420" height="430" rx="18" fill="#080b0f" stroke="#bd4dff" stroke-width="3"/>
 <circle cx="210" cy="120" r="82" fill="none" stroke="#bd4dff" stroke-width="3" filter="url(#glow)"/><path d="M210 45v145M175 85h70M175 145h70M210 45l-25 40M210 45l25 40" fill="none" stroke="url(#purple)" stroke-width="10" filter="url(#glow)"/>
 <text x="210" y="250" text-anchor="middle" fill="#d26cff" font-family="Arial" font-weight="800" font-size="36">ATRANIC</text>
 <text x="210" y="286" text-anchor="middle" fill="#fff" font-family="monospace" font-size="16">THE LANGUAGE</text>
 <text x="48" y="338" fill="#a9bac0" font-family="Arial" font-size="18">Semantic glyphs · Shared meaning</text><text x="48" y="372" fill="#a9bac0" font-family="Arial" font-size="18">Machine-readable · Human-legible</text>
</g>
<g transform="translate(1090 235)">
 <rect width="420" height="430" rx="18" fill="#080b0f" stroke="#53f3ff" stroke-width="3"/>
 <g transform="translate(115 35)" filter="url(#glow)"><path d="M0 45L95 0l95 45v120l-95 45L0 165z" fill="#07171d" stroke="#53f3ff" stroke-width="4"/><path d="M95 0v210M0 45l95 45 95-45" fill="none" stroke="#53f3ff" stroke-opacity=".5"/></g>
 <text x="210" y="250" text-anchor="middle" fill="#53f3ff" font-family="Arial" font-weight="800" font-size="36">ATRALITH</text>
 <text x="210" y="286" text-anchor="middle" fill="#fff" font-family="monospace" font-size="16">THE AGENT KIT</text>
 <text x="48" y="338" fill="#a9bac0" font-family="Arial" font-size="18">MCP server · SDKs · Validators</text><text x="48" y="372" fill="#a9bac0" font-family="Arial" font-size="18">Adapters · Receipts · Agent tools</text>
